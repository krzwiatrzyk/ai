version: "3"

includes:
  containers:
    taskfile: containers/Taskfile.yaml
    dir: containers

tasks:
  cursor:install:
    cmds:
    - curl https://cursor.com/install -fsS | bash
    status:
    - command -v agent

  
  symlink:claude:
    desc: Symlink Claude Code config files to ~/.claude
    cmds:
      - ln -sf {{.ROOT_DIR}}/claude/settings.json ~/.claude/settings.json
      - ln -sf {{.ROOT_DIR}}/claude/scripts ~/.claude/scripts

  agent:symlink:skills:
    desc: Symlink agent skills files to ~/.agent/skills
    cmds:
      - mkdir -p ~/.agent/skills
      - ln -sf {{.ROOT_DIR}}/skills ~/.agent/skills

  cursor:symlink:skills:
    desc: Symlink cursor skills files to ~/.cursor/skills
    cmds:
      - ln -sf {{.ROOT_DIR}}/skills ~/.cursor

  install:skills:
    desc: Copy all skills from skills/ to ~/.claude/skills/
    cmds:
      - mkdir -p ~/.claude/skills
      - for:
          var: SKILLS
        cmd: cp -r {{.ROOT_DIR}}/skills/{{.ITEM}} ~/.claude/skills/{{.ITEM}}
    vars:
      SKILLS:
        sh: ls -1 skills/ | grep -v '^\.'

  install:claudes:
    desc: Install claudes command system-wide
    cmds:
      - sudo cp {{.ROOT_DIR}}/claude/claudes.sh /usr/local/bin/claudes
      - chmod +x /usr/local/bin/claudes

  commit:
    - git add .
    - git commit -m "Update Claude Code configuration and scripts"
    - git push

  claude:check:credentials: security find-generic-password -s "Claude Code-credentials" -w
